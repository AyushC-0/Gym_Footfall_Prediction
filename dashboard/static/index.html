<!-- BEGIN: Interactive Scripts -->
<script data-purpose="parallax-effect">
    document.addEventListener('mousemove', (e) => {
      const items = [
        { id: 'p-item-1', factor: -0.05 },
        { id: 'p-item-2', factor: 0.03 },
        { id: 'p-item-3', factor: -0.07 },
        { id: 'p-item-4', factor: 0.04 },
        { id: 'p-item-5', factor: 0.02 }
      ];

      const mouseX = e.clientX;
      const mouseY = e.clientY;

      items.forEach(item => {
        const el = document.getElementById(item.id);
        if (el) {
          const x = (window.innerWidth / 2 - mouseX) * item.factor;
          const y = (window.innerHeight / 2 - mouseY) * item.factor;
          const rotation = item.factor * 500;
          el.style.transform = `translate(${x}px, ${y}px) rotate(${rotation}deg)`;
        }
      });
    });
  </script>
<!-- END: Interactive Scripts -->
